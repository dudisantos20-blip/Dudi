<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUDI Store - As Melhores Ofertas do Mercado Livre</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #ffe600; --dark: #0a0a0a; --darker: #050505; --card: #111111; --text: #ffffff; --text-secondary: #888888; --accent: #ff6b00; --success: #00d084; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--darker); color: var(--text); line-height: 1.6; }
        .bg-effect { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 20% 80%, rgba(255, 230, 0, 0.03) 0%, transparent 50%), radial-gradient(circle at 80% 20%, rgba(255, 107, 0, 0.03) 0%, transparent 50%); pointer-events: none; z-index: -1; }
        header { background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); position: sticky; top: 0; z-index: 1000; padding: 1rem 0; }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 2rem; }
        .header-content { display: flex; align-items: center; justify-content: space-between; gap: 2rem; }
        .logo { display: flex; align-items: center; gap: 0.5rem; font-size: 1.8rem; font-weight: 800; color: var(--primary); text-decoration: none; text-transform: uppercase; letter-spacing: -1px; }
        .logo i { font-size: 2rem; }
        .search-box { flex: 1; max-width: 600px; position: relative; }
        .search-box input { width: 100%; padding: 1rem 1.5rem; padding-right: 3.5rem; border: 2px solid rgba(255, 255, 255, 0.1); border-radius: 50px; background: var(--card); color: var(--text); font-size: 1rem; transition: all 0.3s; }
        .search-box input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 20px rgba(255, 230, 0, 0.1); }
        .search-box button { position: absolute; right: 5px; top: 50%; transform: translateY(-50%); background: var(--primary); border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; color: var(--dark); font-size: 1.1rem; }
        .header-actions { display: flex; gap: 1.5rem; align-items: center; }
        .header-actions a { color: var(--text); text-decoration: none; font-size: 1.3rem; transition: color 0.3s; }
        .header-actions a:hover { color: var(--primary); }
        nav { background: var(--card); border-bottom: 1px solid rgba(255, 255, 255, 0.05); padding: 0.8rem 0; overflow-x: auto; }
        .nav-links { display: flex; gap: 2rem; list-style: none; white-space: nowrap; }
        .nav-links a { color: var(--text-secondary); text-decoration: none; font-size: 0.95rem; font-weight: 500; transition: all 0.3s; display: flex; align-items: center; gap: 0.5rem; }
        .nav-links a:hover, .nav-links a.active { color: var(--primary); }
        .hero { padding: 4rem 0; text-align: center; }
        .hero h1 { font-size: 3.5rem; margin-bottom: 1rem; background: linear-gradient(135deg, var(--text) 0%, var(--primary) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero p { font-size: 1.3rem; color: var(--text-secondary); max-width: 600px; margin: 0 auto 2rem; }
        .commission-badge { display: inline-flex; align-items: center; gap: 0.5rem; background: linear-gradient(135deg, var(--success), #00a86b); color: white; padding: 0.8rem 1.5rem; border-radius: 50px; font-weight: 600; font-size: 1rem; box-shadow: 0 10px 30px rgba(0, 208, 132, 0.3); }
        .categories { padding: 3rem 0; }
        .section-title { font-size: 2rem; margin-bottom: 2rem; display: flex; align-items: center; gap: 1rem; }
        .section-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, rgba(255,255,255,0.2), transparent); }
        .category-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; }
        .category-card { background: var(--card); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 20px; padding: 2rem; text-align: center; cursor: pointer; transition: all 0.3s; }
        .category-card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5); }
        .category-icon { font-size: 3rem; margin-bottom: 1rem; color: var(--primary); }
        .products { padding: 3rem 0; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; }
        .product-card { background: var(--card); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s; }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5); border-color: rgba(255, 230, 0, 0.3); }
        .product-badge { position: absolute; top: 1rem; left: 1rem; background: var(--accent); color: white; padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
        .product-image { width: 100%; height: 250px; background: linear-gradient(135deg, #1a1a1a, #2a2a2a); display: flex; align-items: center; justify-content: center; color: var(--text-secondary); font-size: 4rem; position: relative; }
        .product-info { padding: 1.5rem; }
        .product-title { font-size: 1rem; margin-bottom: 0.5rem; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .product-price { font-size: 1.5rem; font-weight: 700; color: var(--text); margin-bottom: 0.5rem; }
        .product-installments { font-size: 0.85rem; color: var(--success); margin-bottom: 1rem; }
        .product-shipping { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: var(--success); margin-bottom: 1rem; }
        .buy-button { width: 100%; padding: 1rem; background: var(--primary); color: var(--dark); border: none; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 0.5rem; text-decoration: none; }
        .buy-button:hover { transform: scale(1.02); box-shadow: 0 10px 30px rgba(255, 230, 0, 0.3); }
        .affiliate-notice { background: rgba(255, 230, 0, 0.05); border: 1px solid rgba(255, 230, 0, 0.2); border-radius: 12px; padding: 1rem; margin-bottom: 2rem; display: flex; align-items: center; gap: 1rem; font-size: 0.9rem; color: var(--text-secondary); }
        .features { padding: 4rem 0; background: var(--card); margin: 3rem 0; }
        .features-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 3rem; text-align: center; }
        .feature-icon { width: 80px; height: 80px; background: linear-gradient(135deg, var(--primary), var(--accent)); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; font-size: 2rem; color: var(--dark); }
        footer { background: var(--dark); border-top: 1px solid rgba(255, 255, 255, 0.05); padding: 4rem 0 2rem; }
        .footer-content { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 3rem; margin-bottom: 3rem; }
        .footer-section h4 { color: var(--primary); margin-bottom: 1.5rem; font-size: 1.2rem; }
        .footer-section ul { list-style: none; }
        .footer-section li { margin-bottom: 0.8rem; }
        .footer-section a { color: var(--text-secondary); text-decoration: none; transition: color 0.3s; }
        .footer-section a:hover { color: var(--text); }
        .footer-bottom { text-align: center; padding-top: 2rem; border-top: 1px solid rgba(255, 255, 255, 0.05); color: var(--text-secondary); }
        @media (max-width: 768px) { .hero h1 { font-size: 2rem; } .products-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; } }
    </style>
</head>
